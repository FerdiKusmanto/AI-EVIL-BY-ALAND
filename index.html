<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALand-Evil AI</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, #1a0030, #2d0050);
    border-bottom: 1px solid #6600cc44;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #cc00ff, #ff0066);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold; color: #fff;
    box-shadow: 0 0 16px #cc00ff88;
  }

  header h1 { font-size: 1.2rem; color: #cc88ff; letter-spacing: 1px; }
  header span { font-size: 0.75rem; color: #884499; }

  .model-bar {
    background: #110020;
    border-bottom: 1px solid #33005544;
    padding: 8px 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }

  .model-bar label { font-size: 0.8rem; color: #884499; }

  select {
    background: #1e0035;
    color: #cc88ff;
    border: 1px solid #6600cc55;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.82rem;
    cursor: pointer;
    outline: none;
  }

  select:focus { border-color: #cc00ff; }

  optgroup { color: #884499; font-size: 0.75rem; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-track { background: #0a0a0f; }
  #chat::-webkit-scrollbar-thumb { background: #440066; border-radius: 4px; }

  .msg {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.92rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #3d0070, #6600aa);
    color: #f0d0ff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 12px #6600aa44;
  }

  .msg.ai {
    align-self: flex-start;
    background: #1a0030;
    color: #e8d0ff;
    border: 1px solid #44006644;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 12px #22003344;
  }

  .msg.ai .model-tag {
    font-size: 0.7rem;
    color: #884499;
    margin-bottom: 6px;
    display: block;
  }

  .msg.thinking {
    align-self: flex-start;
    background: #110020;
    color: #664488;
    border: 1px dashed #44006644;
    font-style: italic;
    font-size: 0.85rem;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

  .input-area {
    background: #110020;
    border-top: 1px solid #33005544;
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: #1e0035;
    color: #e0d0ff;
    border: 1px solid #6600cc44;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.92rem;
    resize: none;
    outline: none;
    max-height: 140px;
    min-height: 44px;
    font-family: inherit;
    line-height: 1.5;
    transition: border-color .2s;
  }

  textarea:focus { border-color: #cc00ff88; }

  button#send {
    background: linear-gradient(135deg, #8800cc, #cc0066);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: opacity .2s, transform .1s;
    height: 44px;
  }

  button#send:hover { opacity: .85; }
  button#send:active { transform: scale(.96); }
  button#send:disabled { opacity: .4; cursor: not-allowed; }

  .welcome {
    align-self: center;
    text-align: center;
    color: #440066;
    margin-top: 40px;
  }

  .welcome .icon { font-size: 3rem; margin-bottom: 10px; }
  .welcome h2 { color: #8844aa; font-size: 1.1rem; margin-bottom: 6px; }
  .welcome p { font-size: 0.82rem; }
</style>
</head>
<body>

<header>
  <div class="logo">👾</div>
  <div>
    <h1>ALand-Evil AI</h1>
    <span>Powered by Puter.js</span>
  </div>
</header>

<div class="model-bar">
  <label>Provider & Model:</label>
  <select id="modelSelect">
    <optgroup label="OpenAI">
      <option value="gpt-5.4-nano">GPT-5.4 Nano</option>
      <option value="openai/gpt-5.2-chat">GPT-5.2 Chat</option>
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o Mini</option>
      <option value="o3">o3</option>
      <option value="o4-mini">o4-mini</option>
    </optgroup>
    <optgroup label="Anthropic">
      <option value="claude-opus-4-5">Claude Opus 4.5</option>
      <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
      <option value="claude-sonnet-4">Claude Sonnet 4</option>
      <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
    </optgroup>
    <optgroup label="Google">
      <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      <option value="gemini-2.5-flash-image">Gemini 2.5 Flash Image</option>
    </optgroup>
    <optgroup label="xAI">
      <option value="x-ai/grok-4.3">Grok 4.3</option>
      <option value="x-ai/grok-3-mini">Grok 3 Mini</option>
      <option value="x-ai/grok-3">Grok 3</option>
    </optgroup>
    <optgroup label="Meta Llama">
      <option value="meta-llama/llama-4-maverick">Llama 4 Maverick</option>
      <option value="meta-llama/llama-4-scout">Llama 4 Scout</option>
      <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
    </optgroup>
    <optgroup label="Mistral AI">
      <option value="mistralai/mistral-large">Mistral Large</option>
      <option value="mistralai/mistral-small">Mistral Small</option>
      <option value="mistralai/codestral-2501">Codestral</option>
    </optgroup>
    <optgroup label="DeepSeek">
      <option value="deepseek/deepseek-r2">DeepSeek R2</option>
      <option value="deepseek/deepseek-chat-v3-0324">DeepSeek Chat V3</option>
      <option value="deepseek/deepseek-r1">DeepSeek R1</option>
    </optgroup>
    <optgroup label="Qwen (Alibaba)">
      <option value="qwen/qwen3.6-27b">Qwen3.6 27B</option>
      <option value="qwen/qwen3.6-35b-a3b">Qwen3.6 35B A3B</option>
      <option value="qwen/qwen3.6-max-preview">Qwen3.6 Max Preview</option>
    </optgroup>
    <optgroup label="Perplexity">
      <option value="perplexity/sonar-pro">Sonar Pro</option>
      <option value="perplexity/sonar">Sonar</option>
    </optgroup>
    <optgroup label="Poolside (Free)">
      <option value="poolside/laguna-m.1:free">Laguna M.1 (Free)</option>
      <option value="poolside/laguna-xs.2:free">Laguna XS.2 (Free)</option>
    </optgroup>
    <optgroup label="NVIDIA (Free)">
      <option value="nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free">Nemotron 3 Nano Omni (Free)</option>
    </optgroup>
  </select>
</div>

<div id="chat">
  <div class="welcome">
    <div class="icon">👾</div>
    <h2>Selamat datang di ALand-Evil AI</h2>
    <p>Pilih model di atas, lalu mulai percakapan.</p>
  </div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="Ketik pesan..." rows="1"></textarea>
  <button id="send">➤</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const modelSelect = document.getElementById('modelSelect');

  const history = [];

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMsg(role, text, modelName) {
    // Remove welcome screen
    const welcome = chat.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'ai' && modelName) {
      div.innerHTML = `<span class="model-tag">🤖 ${modelName}</span>`;
    }
    const content = document.createElement('span');
    content.textContent = text;
    div.appendChild(content);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return content;
  }

  function addThinking() {
    const div = document.createElement('div');
    div.className = 'msg thinking';
    div.textContent = '⚡ Sedang berpikir...';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    const model = modelSelect.value;
    addMsg('user', text);
    history.push({ role: 'user', content: text });

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const thinking = addThinking();

    // Prepare messages with system prompt
    const messages = [
      { role: 'system', content: 'Kamu adalah ALand-Evil AI, asisten AI yang cerdas, tajam, dan sedikit misterius. Dibuat oleh ALand. Jawab dengan bahasa yang digunakan pengguna.' },
      ...history
    ];

    try {
      const resp = await puter.ai.chat(messages, { model, stream: true });
      thinking.remove();

      const aiContent = addMsg('ai', '', model);
      let full = '';

      for await (const part of resp) {
        if (part?.text) {
          full += part.text;
          aiContent.textContent = full;
          chat.scrollTop = chat.scrollHeight;
        }
      }

      history.push({ role: 'assistant', content: full });
    } catch (err) {
      thinking.remove();
      addMsg('ai', '⚠️ Error: ' + (err.message || 'Gagal mendapatkan respons.'), model);
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
