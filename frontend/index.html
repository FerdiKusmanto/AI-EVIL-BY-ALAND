<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALand-Evil AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, #1a0030, #2d0050);
    border-bottom: 1px solid #6600cc44;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #cc00ff, #ff0066);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
    box-shadow: 0 0 16px #cc00ff88;
  }

  header h1 { font-size: 1.2rem; color: #cc88ff; letter-spacing: 1px; }
  header span { font-size: 0.75rem; color: #884499; }

  .model-bar {
    background: #110020;
    border-bottom: 1px solid #33005544;
    padding: 8px 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }

  .model-bar label { font-size: 0.8rem; color: #884499; }

  select {
    background: #1e0035;
    color: #cc88ff;
    border: 1px solid #6600cc55;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.82rem;
    cursor: pointer;
    outline: none;
    min-width: 180px;
  }

  select:focus { border-color: #cc00ff; }

  #status {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 20px;
    background: #1e0035;
    border: 1px solid #6600cc33;
  }

  #status.ok { color: #44ff88; border-color: #44ff8844; }
  #status.err { color: #ff4466; border-color: #ff446644; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-track { background: #0a0a0f; }
  #chat::-webkit-scrollbar-thumb { background: #440066; border-radius: 4px; }

  .msg {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.92rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #3d0070, #6600aa);
    color: #f0d0ff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 12px #6600aa44;
  }

  .msg.ai {
    align-self: flex-start;
    background: #1a0030;
    color: #e8d0ff;
    border: 1px solid #44006644;
    border-bottom-left-radius: 4px;
  }

  .msg.ai .model-tag {
    font-size: 0.7rem;
    color: #884499;
    margin-bottom: 6px;
    display: block;
  }

  .msg.thinking {
    align-self: flex-start;
    background: #110020;
    color: #664488;
    border: 1px dashed #44006644;
    font-style: italic;
    font-size: 0.85rem;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

  .input-area {
    background: #110020;
    border-top: 1px solid #33005544;
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: #1e0035;
    color: #e0d0ff;
    border: 1px solid #6600cc44;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.92rem;
    resize: none;
    outline: none;
    max-height: 140px;
    min-height: 44px;
    font-family: inherit;
    line-height: 1.5;
    transition: border-color .2s;
  }

  textarea:focus { border-color: #cc00ff88; }

  button#send {
    background: linear-gradient(135deg, #8800cc, #cc0066);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: opacity .2s, transform .1s;
    height: 44px;
  }

  button#send:hover { opacity: .85; }
  button#send:active { transform: scale(.96); }
  button#send:disabled { opacity: .4; cursor: not-allowed; }

  .welcome {
    align-self: center;
    text-align: center;
    color: #440066;
    margin-top: 40px;
  }

  .welcome .icon { font-size: 3rem; margin-bottom: 10px; }
  .welcome h2 { color: #8844aa; font-size: 1.1rem; margin-bottom: 6px; }
  .welcome p { font-size: 0.82rem; line-height: 1.8; }
  .welcome code {
    background: #1e0035;
    color: #cc88ff;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<header>
  <div class="logo">👾</div>
  <div>
    <h1>ALand-Evil AI</h1>
    <span>by ALand · Local AI via Ollama (tanpa API key)</span>
  </div>
</header>

<div class="model-bar">
  <label>Model:</label>
  <select id="modelSelect"><option value="">— memuat model —</option></select>
  <span id="status">⏳ menghubungkan...</span>
</div>

<div id="chat">
  <div class="welcome">
    <div class="icon">👾</div>
    <h2>ALand-Evil AI — Local Mode</h2>
    <p>
      Pastikan Ollama berjalan dan sudah ada model.<br>
      Contoh: <code>ollama pull llama3.2</code> lalu <code>ollama serve</code>
    </p>
  </div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="Ketik pesan..." rows="1"></textarea>
  <button id="send">➤</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const modelSelect = document.getElementById('modelSelect');
  const statusEl = document.getElementById('status');
  const history = [];

  async function loadModels() {
    try {
      const r = await fetch('/api/models');
      const models = await r.json();
      if (models.length === 0) throw new Error('no models');
      modelSelect.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
      statusEl.textContent = '✓ Ollama terhubung';
      statusEl.className = 'ok';
    } catch {
      modelSelect.innerHTML = '<option value="">Tidak ada model</option>';
      statusEl.textContent = '✗ Ollama tidak berjalan';
      statusEl.className = 'err';
    }
  }

  loadModels();

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMsg(role, text, modelName) {
    const welcome = chat.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'ai' && modelName) {
      const tag = document.createElement('span');
      tag.className = 'model-tag';
      tag.textContent = `🤖 ${modelName}`;
      div.appendChild(tag);
    }
    const content = document.createElement('span');
    content.textContent = text;
    div.appendChild(content);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return content;
  }

  function addThinking() {
    const div = document.createElement('div');
    div.className = 'msg thinking';
    div.textContent = '⚡ Sedang berpikir...';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    const model = modelSelect.value;
    if (!text || !model) return;

    addMsg('user', text);
    history.push({ role: 'user', content: text });

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const thinking = addThinking();

    const messages = [
      { role: 'system', content: 'Kamu adalah ALand-Evil AI, asisten AI yang cerdas, tajam, dan sedikit misterius. Dibuat oleh ALand. Jawab dengan bahasa yang digunakan pengguna.' },
      ...history
    ];

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, model }),
      });

      thinking.remove();
      const aiContent = addMsg('ai', '', model);
      let full = '';

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n').filter(l => l.startsWith('data: '));
        for (const line of lines) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const { text, error } = JSON.parse(data);
            if (error) full += `\n⚠️ ${error}`;
            else if (text) full += text;
            aiContent.textContent = full;
            chat.scrollTop = chat.scrollHeight;
          } catch {}
        }
      }

      history.push({ role: 'assistant', content: full });
    } catch (err) {
      thinking.remove();
      addMsg('ai', '⚠️ ' + err.message, model);
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
