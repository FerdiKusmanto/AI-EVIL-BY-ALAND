name: Continuous Train

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: continuous-train
  cancel-in-progress: false   # jangan cancel — biarkan selesai dulu

permissions:
  contents: write
  actions: write

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # max GitHub Actions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4 wikipedia-api

      - name: Cancel run lama jika ada
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ambil semua run in_progress selain run ini sendiri
          CURRENT_RUN=${{ github.run_id }}
          gh run list --repo ${{ github.repository }} --status in_progress --json databaseId \
            --jq ".[] | select(.databaseId != $CURRENT_RUN) | .databaseId" \
            | xargs -I{} gh run cancel {} --repo ${{ github.repository }} 2>/dev/null || true
          echo "Cleanup selesai"

      - name: Download dataset terkini
        run: |
          # Download dari release, fallback ke dataset kosong jika gagal
          curl -L --retry 3 --retry-delay 5 -f \
            -o aland-ai/training/dataset.jsonl.gz \
            https://github.com/FerdiKusmanto/AI-EVIL-BY-ALAND/releases/download/dataset-latest/dataset.jsonl.gz \
            && gunzip -f aland-ai/training/dataset.jsonl.gz \
            && echo "Dataset downloaded: $(wc -l < aland-ai/training/dataset.jsonl) lines" \
            || echo "Download gagal, mulai dari dataset kosong"

      - name: Scrape + Train loop (simpan tiap 5 menit)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python aland-ai/training/continuous_train.py

      - name: Self-trigger run berikutnya
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run continuous-train.yml --ref main
