name: Auto Train Weekly

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install transformers peft datasets accelerate huggingface_hub

      - name: Download dataset
        run: |
          curl -L -o aland-ai/training/dataset.jsonl.gz \
            https://github.com/FerdiKusmanto/AI-EVIL-BY-ALAND/releases/download/dataset-latest/dataset.jsonl.gz
          gunzip aland-ai/training/dataset.jsonl.gz

      - name: Train model
        run: python aland-ai/training/train_cloud.py

      - name: Upload model ke release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload model-latest /tmp/aland-id-latest.gguf --clobber 2>/dev/null || \
          gh release create model-latest /tmp/aland-id-latest.gguf --title "Model Latest" --notes "Auto-trained"
